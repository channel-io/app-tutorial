name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: yarn
          cache-dependency-path: wam/yarn.lock
      - run: corepack enable
      - run: make init
      - run: make test
      - run: make build-wam
      - run: make build-go
