name: CI

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - exp
    tags:
      - "v*"
  pull_request:
    branches: [main, exp]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build & Quality Checks
    runs-on: channel-runner
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Format check
        run: pnpm format:check

      - name: Push image
        if: github.event_name == 'push'
        uses: channel-io/ch-github-actions/docker-build-push@v1

  security-check:
    name: Security Check
    runs-on: channel-runner
    timeout-minutes: 5
    needs: build-and-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true
